<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Hub Key System</title>
  <style>
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: radial-gradient(900px 500px at 10% 10%, #1b2050, transparent),
                  radial-gradient(900px 500px at 90% 90%, #2b1b50, transparent),
                  #0f1220;
      color: #e7e9ff; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }
    .card {
      width: min(420px, 92vw); background: #151936; border-radius: 16px;
      padding: 18px; box-shadow: 0 20px 40px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 10px; font-size: 1.2rem; }
    p { margin: 0 0 12px; opacity: .85; }
    input {
      width: 100%; padding: 10px 12px; border-radius: 12px; border: none;
      outline: none; background: #0f1220; color: #e7e9ff;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
    }
    button {
      margin-top: 10px; width: 100%; padding: 10px 12px; border-radius: 12px;
      border: none; cursor: pointer; font-weight: 600;
      background: linear-gradient(180deg, #6b7cff, #5b6cff); color: #fff;
      box-shadow: 0 10px 20px rgba(91,108,255,.35);
    }
    .result {
      margin-top: 10px; font-family: ui-monospace, Menlo, Consolas, monospace;
      background: rgba(0,0,0,.35); padding: 10px; border-radius: 12px; display: none;
      word-break: break-all;
    }
    .ok { color: #9aa1ff; }
    .bad { color: #ff7a7a; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Key System</h1>
    <p>Введи ключ, чтобы получить loader.</p>

    <input id="keyInput" placeholder="Введи ключ..." />
    <button onclick="checkKey()">Проверить</button>

    <div id="msg"></div>
    <div id="result" class="result"></div>
  </div>

  <script>
    // ВСТАВЬ СЮДА Raw ссылку на keys.json
    const KEYS_URL = "RAW_KEYS_URL";

    // ВСТАВЬ СЮДА Raw ссылку на loader.lua
    const LOADER_URL = "RAW_LOADER_URL";

    async function checkKey() {
      const key = document.getElementById("keyInput").value.trim();
      const msg = document.getElementById("msg");
      const res = document.getElementById("result");

      if (!key) {
        msg.innerHTML = '<p class="bad">Введи ключ</p>';
        res.style.display = "none";
        return;
      }

      try {
        const r = await fetch(KEYS_URL);
        const data = await r.json();
        const keys = data.keys || [];

        if (keys.map(String).includes(String(key))) {
          const loader = `loadstring(game:HttpGet("${LOADER_URL}"))()`;
          msg.innerHTML = '<p class="ok">Ключ верный. Скопируй loader:</p>';
          res.textContent = loader;
          res.style.display = "block";

          navigator.clipboard.writeText(loader);
        } else {
          msg.innerHTML = '<p class="bad">Неверный ключ</p>';
          res.style.display = "none";
        }
      } catch (e) {
        msg.innerHTML = '<p class="bad">Ошибка загрузки ключей</p>';
        res.style.display = "none";
      }
    }
  </script>
</body>
</html>
