<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Голосование Netlify</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
    background: url('https://i.pinimg.com/originals/55/01/60/5501609ee45d514d1f2c4a63502045e2.gif') center/cover no-repeat;
    color: white;
  }
  h1 { margin-top: 50px; text-shadow: 2px 2px 5px black; }
  button {
    padding: 15px 30px;
    margin: 15px;
    font-size: 20px;
    cursor: pointer;
    border: none;
    border-radius: 10px;
    background: rgba(0,0,0,0.6);
    color: white;
    transition: transform 0.2s;
  }
  button:hover { transform: scale(1.1); }
  #results { margin-top: 40px; font-size: 20px; }
  .bar-container {
    width: 60%;
    background: rgba(0,0,0,0.5);
    border-radius: 20px;
    margin: 10px auto;
    overflow: hidden;
  }
  .bar {
    height: 40px;
    line-height: 40px;
    background: rgba(76, 175, 80, 0.8);
    text-align: right;
    padding-right: 10px;
    width: 0%;
    transition: width 0.5s ease;
    border-radius: 20px 0 0 20px;
    font-weight: bold;
  }
</style>
</head>
<body>

<h1>Голосование</h1>

<button onclick="vote('kaz')">Қазақстан</button>
<button onclick="vote('rus')">Русский</button>

<div id="results">
  <div>Қазақстан: <span id="kazCount">0</span></div>
  <div class="bar-container">
    <div class="bar" id="kazBar">0%</div>
  </div>

  <div>Русский: <span id="rusCount">0</span></div>
  <div class="bar-container">
    <div class="bar" id="rusBar">0%</div>
  </div>
</div>

<script>
async function vote(choice) {
  const res = await fetch('/.netlify/functions/votes', {
    method: 'POST',
    body: JSON.stringify({ choice }),
  });
  const votes = await res.json();
  updateResults(votes);
}

async function fetchVotes() {
  const res = await fetch('/.netlify/functions/votes');
  const votes = await res.json();
  updateResults(votes);
}

function updateResults(votes) {
  const total = votes.kaz + votes.rus;
  const kazPercent = total ? Math.round((votes.kaz / total) * 100) : 0;
  const rusPercent = total ? Math.round((votes.rus / total) * 100) : 0;

  document.getElementById('kazCount').innerText = votes.kaz;
  document.getElementById('rusCount').innerText = votes.rus;

  document.getElementById('kazBar').style.width = kazPercent + '%';
  document.getElementById('kazBar').innerText = kazPercent + '%';

  document.getElementById('rusBar').style.width = rusPercent + '%';
  document.getElementById('rusBar').innerText = rusPercent + '%';
}

// обновляем каждые 2 секунды, чтобы все видели новые голоса
setInterval(fetchVotes, 2000);
fetchVotes();
</script>

</body>
</html>
